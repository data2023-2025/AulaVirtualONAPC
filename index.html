    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-image: url('https://data2023-2025.github.io/fondo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 48px;
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.2);
        }
        .login-header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            padding: 36px 32px;
            text-align: center;
            color: white;
        }
        .login-header h1 { font-size: 26px; font-weight: 600; margin-bottom: 8px; }
        .login-header p { font-size: 13px; opacity: 0.88; }
        .login-body { padding: 36px 32px; background: white; }
        .role-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }
        .role-btn {
            flex: 1;
            padding: 12px;
            border: 1.5px solid #bfdbfe;
            background: transparent;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1e40af;
            transition: all 0.3s;
        }
        .role-btn.active {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: white;
            border-color: transparent;
        }
        .form-group { margin-bottom: 22px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #334155;
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 28px;
            font-size: 0.95rem;
            background: #fefcf5;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: white;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
        }
        .login-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(59,130,246,0.3); }
        .login-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .error-msg {
            background: #fef2f2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 28px;
            margin-top: 20px;
            text-align: center;
            font-size: 0.8rem;
            display: none;
        }
        .error-msg a {
            color: #b91c1c;
            text-decoration: underline;
        }
        .success-msg {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 28px;
            margin-top: 20px;
            text-align: center;
            font-size: 0.8rem;
            display: none;
        }
        .login-footer {
            padding: 18px 32px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            background: #f8fafc;
            font-size: 0.7rem;
            color: #64748b;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-top-color: #bfdbfe;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .info-note {
            background: #eff6ff;
            padding: 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            text-align: center;
            margin-top: 16px;
            color: #1e40af;
        }
    </style>

<body>
    <div class="login-container">
        <div class="login-header">
            <h1>📚 AULA VIRTUAL</h1>
            <p>OFICINA NACIONAL DE ATENCION Y PARTICIPACION CIUDADANA</p>
        </div>
        <div class="login-body">
            <div class="role-buttons">
                <button class="role-btn active" data-role="student">👨‍🎓 Estudiante</button>
                <button class="role-btn" data-role="admin">👨‍🏫 Profesor/Admin</button>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>📧 Correo Electrónico</label>
                    <input type="email" id="email" placeholder="tu@email.com" required autocomplete="off">
                </div>
                <div class="form-group" id="passwordGroup" style="display: none;">
                    <label>🔒 Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Ingresar al Aula</button>
                <div class="error-msg" id="errorMsg"></div>
                <div class="success-msg" id="successMsg"></div>
                <div class="info-note" id="infoNote">
                    ℹ️ Los estudiantes deben usar su correo institucional autorizado
                </div>
            </form>
        </div>
        <div class="login-footer">
            <p>© 2025 AULA ONAPC - Todos los derechos reservados</p>
        </div>
    </div>

    <script>
        // ==================== LISTA DE CORREOS AUTORIZADOS ====================
        // Estudiantes autorizados (lista blanca)
        const STUDENT_WHITELIST = new Set([
            // CARACAS DEM
            'abogadosparticipacion2026@gmail.com',
            // CARABOBO
            'juvematosr@gmail.com',
            // COJEDES
            'opcregionalcojedes@gmail.com',
            // PORTUGUESA GUANARE
            'participacionc564@gmail.com',
            // PORTUGUESA ACARIGUA
            'participacionciudadanaacarigua@gmail.com',
            // BARINAS
            'orapc.bnas@gmail.com',
            // ARAGUA
            'participacionciudadanaestadoar@gmail.com',
            // ANZOATEGUI BARCELONA
            'orapc.anzoategui@gmail.com',
            // ANZOATEGUI EL TIGRE
            'oapceltigre27@gmail.com',
            // CIUDAD BOLIVAR
            'orapc.ciudadbolivar123@gmail.com',
            // BOLIVAR PUERTO ORDAZ
            'participacionciudadana940@gmail.com',
            // OPC MONAGAS
            'opcmonagas2023@gmail.com',
            // NUEVA ESPARTA
            'mariluescalante.11@gmail.com',
            // DELTA AMACURO
            'deltaparticipacionciudadana@gmail.com',
            // SUCRE CUMANA
            'orapc.sucre.cumana@gmail.com',
            // AMAZONAS
            'sanchezchristopher458@gmail.com',
            // MIRANDA GUARENAS
            'opc.guarenas@gmail.com',
            // MIRANDA BARLOVENTO
            'opc.extbatlovento@gmail.com',
            // MIRANDA VALLES DEL TUY
            'pcvallesdeltuy@gmail.com',
            // MIRANDA LOS TEQUES
            'pciudadanadarmiranda@gmail.com',
            // TRUJILLO
            'participacionciudadanadart2023@gmail.com',
            // GUARICO
            'herrera.diego7@gmail.com',
            // LA GUAIRA
            'participacioncdarlaguaira239@gmail.com',
            // APURE
            'orapc.apure.sanfdo@gmail.com',
            // FALCON CORO
            'orapcfalconcoro@gmail.com',
            // PUNTO FIJO
            'mataedglys@gmail.com',
            // MERIDA EL VIGIA
            'oraopcextelvigia@gmail.com',
            // MERIDA LIBERTADOR
            'oraopc.merida@gmail.com',
            // MERIDA TOVAR
            'orapc.ext.tovar@gmail.com',
            // CARACAS
            'orapc.caracas@gmail.com',
            // LARA BARQUISIMETO
            'aurateran1957@gmail.com',
            // LARA CARORA
            'estefanyaherrera.111@gmail.com',
            // TACHIRA
            'orapctachira2024@gmail.com',
            // ZULIA MARACAIBO
            'orapcmaracaibo@gmail.com',
            // ZULIA TORREMARA
            'opctorremara2026@gmail.com',
            // YARACUY
            'orapccjpyaracuy@gmail.com'
        ]);
        
        // ==================== SISTEMA DE SEGURIDAD ====================
        
        // Administradores autorizados (email + contraseña específica)
        // ⚠️ NOTA DE SEGURIDAD: En producción, esto debe estar en un servidor backend con autenticación JWT
        const ADMIN_CREDENTIALS = {
            'data2023equidad@gmail.com': '58ky8gu6',
            'dem.corderom@gmail.com': 'cordem2*26'  // Misma contraseña
        };
        
        let currentRole = 'student';
        let loginAttempts = 0;
        const MAX_LOGIN_ATTEMPTS = 5;
        let lockoutTime = null;
        
        // Función para normalizar emails (minúsculas, sin espacios)
        function normalizeEmail(email) {
            return email ? email.trim().toLowerCase() : '';
        }
        
        // Validación de email con seguridad mejorada
        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                return false;
            }
            // Prevenir emails potencialmente peligrosos
            const dangerousPatterns = [
                /<script/i,
                /javascript:/i,
                /data:/i,
                /vbscript:/i,
                /onload/i,
                /onerror/i
            ];
            
            for (const pattern of dangerousPatterns) {
                if (pattern.test(email)) {
                    return false;
                }
            }
            return true;
        }
        
        // Sistema de prevención de ataques de fuerza bruta
        function checkLoginLockout() {
            if (lockoutTime && Date.now() < lockoutTime) {
                const remainingTime = Math.ceil((lockoutTime - Date.now()) / 1000);
                return remainingTime;
            }
            return null;
        }
        
        function recordFailedLogin() {
            loginAttempts++;
            if (loginAttempts >= MAX_LOGIN_ATTEMPTS) {
                lockoutTime = Date.now() + (15 * 60 * 1000); // 15 minutos de bloqueo
                loginAttempts = 0;
                return true;
            }
            return false;
        }
        
        function resetLoginAttempts() {
            loginAttempts = 0;
            lockoutTime = null;
        }
        
        // Verificar si un email está autorizado como estudiante
        function isAuthorizedStudent(email) {
            const normalizedEmail = normalizeEmail(email);
            return STUDENT_WHITELIST.has(normalizedEmail);
        }
        
        // Verificar si un email es administrador válido
        function isValidAdmin(email, password) {
            const normalizedEmail = normalizeEmail(email);
            return ADMIN_CREDENTIALS[normalizedEmail] === password;
        }
        
        // Mostrar mensaje de error
        function showError(message) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerHTML = message;
            errorDiv.style.display = 'block';
            const successDiv = document.getElementById('successMsg');
            successDiv.style.display = 'none';
            
            // Auto-ocultar después de 5 segundos
            setTimeout(() => {
                if (errorDiv.style.display === 'block') {
                    errorDiv.style.display = 'none';
                }
            }, 5000);
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMsg');
            successDiv.innerHTML = message;
            successDiv.style.display = 'block';
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'none';
        }
        
        // UI: cambiar entre roles
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentRole = this.getAttribute('data-role');
                const pwdGroup = document.getElementById('passwordGroup');
                const infoNote = document.getElementById('infoNote');
                
                if (currentRole === 'admin') {
                    pwdGroup.style.display = 'block';
                    infoNote.innerHTML = '🔐 Acceso restringido para administradores. Use sus credenciales.';
                } else {
                    pwdGroup.style.display = 'none';
                    document.getElementById('password').value = '';
                    infoNote.innerHTML = 'ℹ️ Los estudiantes deben usar su correo institucional autorizado. Si no está autorizado, contacte al administrador.';
                }
                document.getElementById('errorMsg').style.display = 'none';
                document.getElementById('successMsg').style.display = 'none';
            });
        });
        
        // Submit del formulario
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            // Verificar bloqueo por intentos fallidos
            const lockoutRemaining = checkLoginLockout();
            if (lockoutRemaining) {
                const minutes = Math.floor(lockoutRemaining / 60);
                const seconds = lockoutRemaining % 60;
                showError(`🔒 Demasiados intentos fallidos. Intenta de nuevo en ${minutes}m ${seconds}s.`);
                return;
            }
            
            // Validaciones mejoradas
            if (!email) {
                showError('✏️ Ingresa tu correo electrónico');
                return;
            }
            
            if (!validateEmail(email)) {
                showError('❌ Formato de correo electrónico inválido');
                return;
            }
            
            if (currentRole === 'admin') {
                if (!password) {
                    showError('✏️ Ingresa la contraseña');
                    return;
                }
                if (password.length < 6) {
                    showError('❌ La contraseña debe tener al menos 6 caracteres');
                    return;
                }
            }
            
            // Deshabilitar botón durante la verificación
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Verificando acceso...';
            errorDiv.style.display = 'none';
            
            setTimeout(() => {
                if (currentRole === 'admin') {
                    // Verificar administrador
                    if (isValidAdmin(email, password)) {
                        resetLoginAttempts();
                        showSuccess('✅ Acceso concedido. Redirigiendo al panel de administración...');
                        // Usar sessionStorage para seguridad (se limpia al cerrar navegador)
                        sessionStorage.setItem('adminSessionActive', 'true');
                        sessionStorage.setItem('adminSessionStart', Date.now().toString());
                        sessionStorage.setItem('adminEmail', normalizeEmail(email));
                        sessionStorage.removeItem('studentEmail');
                        localStorage.removeItem('studentEmail');
                        setTimeout(() => {
                            window.location.href = 'admin.html';
                        }, 500);
                    } else {
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = 'Ingresar al Aula';
                        const isLocked = recordFailedLogin();
                        if (isLocked) {
                            showError('🔒 Demasiados intentos fallidos. Tu cuenta ha sido bloqueada temporalmente por 15 minutos.');
                        } else {
                            const attemptsLeft = MAX_LOGIN_ATTEMPTS - loginAttempts;
                            showError(`❌ Acceso denegado. Correo o contraseña incorrectos. ${attemptsLeft} intentos restantes.`);
                        }
                    }
                } 
                else if (currentRole === 'student') {
                    // Verificar estudiante autorizado
                    if (isAuthorizedStudent(email)) {
                        resetLoginAttempts();
                        showSuccess('✅ Correo autorizado. Redirigiendo al aula virtual...');
                        sessionStorage.setItem('studentEmail', normalizeEmail(email));
                        localStorage.setItem('studentEmail', normalizeEmail(email));
                        sessionStorage.removeItem('adminSessionActive');
                        sessionStorage.removeItem('adminSessionStart');
                        setTimeout(() => {
                            window.location.href = 'student.html';
                        }, 500);
                    } else {
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = 'Ingresar al Aula';
                        const isLocked = recordFailedLogin();
                        if (isLocked) {
                            showError('🔒 Demasiados intentos fallidos. Tu cuenta ha sido bloqueada temporalmente por 15 minutos.');
                        } else {
                            const attemptsLeft = MAX_LOGIN_ATTEMPTS - loginAttempts;
                            const emailDomain = email.split('@')[1];
                            let sugerencia = '';
                            if (emailDomain === 'gmail.com' || emailDomain === 'GMAIL.COM') {
                                sugerencia = '<br><br>📧 Si crees que deberías tener acceso, contacta al administrador para agregar tu correo a la lista de autorizados.';
                            }
                            showError(`❌ Acceso denegado. El correo "${email}" no está autorizado para acceder como estudiante.${sugerencia} ${attemptsLeft} intentos restantes.`);
                        }
                    }
                }
            }, 800);
        });
        
        // Prevenir envío con Enter si está deshabilitado
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('loginBtn').click();
            }
        });
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('loginBtn').click();
            }
        });
    </script>
