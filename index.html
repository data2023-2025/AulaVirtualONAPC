<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AULA ONAPC - Acceso</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://cloud.appwrite.io; img-src 'self' data: https://*.googleusercontent.com; frame-src 'self' https://drive.google.com https://docs.google.com https://www.youtube.com https://player.vimeo.com https://view.officeapps.live.com;">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-image: url('https://lh3.googleusercontent.com/profile/picture/0');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 48px;
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.2);
        }
        .login-header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            padding: 36px 32px;
            text-align: center;
            color: white;
        }
        .login-header h1 { font-size: 26px; font-weight: 600; margin-bottom: 8px; }
        .login-header p { font-size: 13px; opacity: 0.88; }
        .login-body { padding: 36px 32px; background: white; }
        .role-buttons { display: flex; gap: 12px; margin-bottom: 28px; }
        .role-btn {
            flex: 1; padding: 12px; border: 1.5px solid #bfdbfe; background: transparent;
            border-radius: 60px; cursor: pointer; font-weight: 500; font-size: 0.85rem;
            color: #1e40af; transition: all 0.3s;
        }
        .role-btn.active { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); color: white; border-color: transparent; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #334155; font-size: 0.75rem; text-transform: uppercase; }
        .form-group input { width: 100%; padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 28px; font-size: 0.95rem; background: #fefcf5; transition: all 0.3s; }
        .form-group input:focus { outline: none; border-color: #3b82f6; background: white; }
        .login-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: white; border: none; border-radius: 60px; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; margin-top: 8px; transition: all 0.3s;
        }
        .login-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(59,130,246,0.3); }
        .login-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .error-msg { background: #fef2f2; color: #b91c1c; padding: 12px; border-radius: 28px; margin-top: 20px; text-align: center; font-size: 0.8rem; display: none; }
        .success-msg { background: #dcfce7; color: #166534; padding: 12px; border-radius: 28px; margin-top: 20px; text-align: center; font-size: 0.8rem; display: none; }
        .login-footer { padding: 18px 32px; text-align: center; border-top: 1px solid #e2e8f0; background: #f8fafc; font-size: 0.7rem; color: #64748b; }
        .info-note { background: #eff6ff; padding: 10px; border-radius: 20px; font-size: 0.7rem; text-align: center; margin-top: 16px; color: #1e40af; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>📚 AULA ONAPC</h1>
            <p>Plataforma educativa profesional</p>
        </div>
        <div class="login-body">
            <div class="role-buttons">
                <button class="role-btn active" id="btnStudent" onclick="setRole('student')">👨‍🎓 Estudiante</button>
                <button class="role-btn" id="btnAdmin" onclick="setRole('admin')">👨‍🏫 Profesor/Admin</button>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>📧 Correo Electrónico</label>
                    <input type="email" id="email" placeholder="tu@email.com" required autocomplete="off">
                </div>
                <div class="form-group" id="passwordGroup" style="display: none;">
                    <label>🔒 Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Ingresar al Aula</button>
                <div class="error-msg" id="errorMsg"></div>
                <div class="success-msg" id="successMsg"></div>
                <div class="info-note" id="infoNote">
                    ℹ️ Los estudiantes deben usar su correo institucional autorizado
                </div>
            </form>
        </div>
        <div class="login-footer">
            <p>© 2026 AULA ONAPC - Todos los derechos reservados</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <script>
        // CONFIGURACIÓN GLOBAL BACKEND APPWRITE
        const client = new Appwrite.Client()
            .setEndpoint('https://cloud.appwrite.io/v1')
            .setProject('PEGA_AQUÍ_TU_PROJECT_ID');

        const account = new Appwrite.Account(client);

        let currentRole = 'student';
        let loginAttempts = 0;
        const maxAttempts = 5;

        // Lista de correos institucionales autorizados
        const STUDENT_WHITELIST = new Set([
            'abogadosparticipacion2026@gmail.com',
            'juvematosr@gmail.com',
            'opcregionalcojedes@gmail.com',
            'participacionc564@gmail.com',
            'participacionciudadanaacarigua@gmail.com',
            'orapc.bnas@gmail.com',
            'participacionciudadanaestadoar@gmail.com',
            'orapc.anzoategui@gmail.com'
        ]);

        function setRole(role) {
            currentRole = role;
            document.getElementById('btnStudent').classList.toggle('active', role === 'student');
            document.getElementById('btnAdmin').classList.toggle('active', role === 'admin');
            document.getElementById('passwordGroup').style.display = role === 'admin' ? 'block' : 'none';
            document.getElementById('infoNote').style.display = role === 'student' ? 'block' : 'none';
            ocultarMensajes();
        }

        function ocultarMensajes() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }

        function mostrarError(msg) {
            const err = document.getElementById('errorMsg');
            err.innerHTML = msg;
            err.style.display = 'block';
        }

        function mostrarExito(msg) {
            const succ = document.getElementById('successMsg');
            succ.innerHTML = msg;
            succ.style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            ocultarMensajes();

            if (loginAttempts >= maxAttempts) {
                mostrarError("⚠️ Acceso bloqueado temporalmente por demasiados intentos.");
                return;
            }

            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.innerHTML = "Validando credenciales...";

            try {
                if (currentRole === 'student') {
                    // Verificación directa en la Lista Blanca Institucional
                    if (STUDENT_WHITELIST.has(email)) {
                        localStorage.setItem('studentEmail', email);
                        mostrarExito("¡Acceso autorizado! Redirigiendo a tu Aula...");
                        setTimeout(() => { window.location.href = 'student.html'; }, 1000);
                    } else {
                        loginAttempts++;
                        mostrarError(`❌ Correo no registrado en el sistema institucional. Intentos restantes: ${maxAttempts - loginAttempts}`);
                    }
                } else {
                    // Autenticación de Administradores mediante Appwrite Sessions
                    await account.createEmailPasswordSession(email, password);
                    mostrarExito("Sesión administrativa correcta. Abriendo panel...");
                    setTimeout(() => { window.location.href = 'admin.html'; }, 1000);
                }
            } catch (error) {
                loginAttempts++;
                mostrarError(`⚠️ Error de autenticación: ${error.message}. Intentos restantes: ${maxAttempts - loginAttempts}`);
            } finally {
                if (btn.innerHTML === "Validando credenciales...") {
                    btn.disabled = false;
                    btn.innerHTML = "Ingresar al Aula";
                }
            }
        });
    </script>
</body>
</html>
