<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AULA ONAPC - Panel de Control</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://cloud.appwrite.io; img-src 'self' data: https://*.googleusercontent.com; frame-src 'self' https://drive.google.com https://docs.google.com https://www.youtube.com https://player.vimeo.com https://view.officeapps.live.com;">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-image: url('https://lh3.googleusercontent.com/profile/picture/0'); background-size: cover; background-position: center; background-attachment: fixed; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .navbar { background: white; padding: 14px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3b82f6; flex-wrap: wrap; gap: 12px; }
        .navbar h2 { color: #1e40af; }
        .clock { font-family: monospace; background: #eff6ff; padding: 6px 14px; border-radius: 40px; color: #1e40af; }
        .logout-btn { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; padding: 8px 24px; border-radius: 40px; cursor: pointer; }
        .right-section { display: flex; gap: 16px; align-items: center; }
        .container { max-width: 1400px; margin: 0 auto; padding: 28px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: rgba(240,249,255,0.95); padding: 22px; border-radius: 28px; text-align: center; border: 1px solid rgba(59,130,246,0.3); backdrop-filter: blur(4px); }
        .stat-number { font-size: 38px; font-weight: 800; color: #1e40af; }
        .stat-label { font-size: 0.85rem; color: #475569; margin-top: 8px; }
        .section { background: rgba(248,250,252,0.95); border-radius: 32px; padding: 24px; margin-bottom: 28px; border: 1px solid rgba(59,130,246,0.25); backdrop-filter: blur(4px); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .btn-primary { background: linear-gradient(135deg,#1e40af,#3b82f6); color: white; border: none; padding: 10px 24px; border-radius: 60px; cursor: pointer; font-weight: 500; }
        .btn-secondary { background: #64748b; color: white; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .btn-danger { background: #dc2626; color: white; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid #3b82f6; color: #1e40af; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .aula-item, .file-item { background: #eff6ff; padding: 16px 20px; border-radius: 24px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .modal { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 32px; max-width: 500px; width: 90%; padding: 28px; }
        .form-group { margin-bottom: 20px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 28px; font-family: inherit; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
        .loader { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .loader.show { display: flex; }
        .spinner { width: 48px; height: 48px; border: 4px solid #e2e8f0; border-top-color: #1e40af; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #initialLoader { position: fixed; top:0; left:0; right:0; bottom:0; background: linear-gradient(135deg,#1e40af,#3b82f6); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
        .initial-spinner { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .student-card { background: white; border-radius: 24px; margin-bottom: 20px; overflow: hidden; border: 1px solid #e2e8f0; }
        .student-header { background: #f1f5f9; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; flex-wrap: wrap; gap: 12px; }
        .student-header:hover { background: #e2e8f0; }
        .student-email { font-weight: 700; color: #1e40af; font-size: 1rem; }
        .student-badge { background: #3b82f6; color: white; padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; }
        .student-stats { display: flex; gap: 20px; font-size: 0.8rem; color: #64748b; }
        .student-details { padding: 20px; display: none; background: #f8fafc; border-top: 1px solid #e2e8f0; }
        .student-details.open { display: block; }
        .session-item { background: white; border-radius: 20px; padding: 16px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
        .session-header { display: flex; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .session-date { color: #3b82f6; font-weight: 500; }
        .aula-visit { background: #eff6ff; padding: 12px; border-radius: 16px; margin-top: 10px; }
        .material-view { background: #fef3c7; padding: 8px 12px; border-radius: 12px; margin: 8px 0 0 20px; font-size: 0.8rem; }
        .progress-chart { width: 100%; height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #1e40af, #3b82f6); width: 0%; }
        .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-input { padding: 10px 16px; border: 1.5px solid #e2e8f0; border-radius: 40px; flex: 1; min-width: 200px; }
    </style>
</head>
<body>
    <div id="initialLoader"><div class="initial-spinner"></div><div style="color:white;">Cargando panel de control...</div></div>
    <div class="navbar">
        <h2>📚 AULA ONAPC - Panel de Control</h2>
        <div class="right-section">
            <div class="clock" id="realTimeClock">--:--:--</div>
            <button class="logout-btn" onclick="logout()">🚪 Salir</button>
        </div>
    </div>
    <div class="container">
        <div class="stats">
            <div class="stat-card"><div class="stat-number" id="totalAulas">0</div><div class="stat-label">Total Aulas</div></div>
            <div class="stat-card"><div class="stat-number" id="totalArchivos">0</div><div class="stat-label">Total Materiales</div></div>
            <div class="stat-card"><div class="stat-number" id="totalEstudiantes">0</div><div class="stat-label">Estudiantes Registrados</div></div>
            <div class="stat-card"><div class="stat-number" id="totalSesiones">0</div><div class="stat-label">Sesiones Totales</div></div>
        </div>
        
        <div id="aulasSection" class="section">
            <div class="section-header">
                <h3>📖 Gestión de Aulas</h3>
                <button class="btn-primary" onclick="mostrarModalAula()">+ Nueva Aula</button>
            </div>
            <div id="aulasList"></div>
        </div>
        
        <div id="filesSection" class="section" style="display: none;">
            <button class="btn-secondary" onclick="volverAulas()">← Volver a Aulas</button>
            <div class="section-header">
                <h3 id="aulaActualTitle"></h3>
                <button class="btn-primary" onclick="mostrarModalArchivo()">+ Cargar Material</button>
            </div>
            <div id="filesList"></div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <h3>📊 Seguimiento de Estudiantes</h3>
                <div>
                    <button class="btn-outline" onclick="exportarDatos()">📎 Exportar a CSV</button>
                    <button class="btn-secondary" onclick="limpiarFiltros()">🔄 Limpiar filtros</button>
                </div>
            </div>
            <div class="filter-bar">
                <input type="text" id="filterEmail" class="filter-input" placeholder="Buscar por email..." onkeyup="filtrarEstudiantes()">
                <select id="filterAula" class="filter-input" onchange="filtrarEstudiantes()">
                    <option value="">Todas las aulas</option>
                </select>
            </div>
            <div id="progressList"></div>
        </div>
    </div>

    <div id="aulaModal" class="modal">
        <div class="modal-content">
            <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
                <span style="font-size:1.2rem;font-weight:600;">📁 Estructurar Aula</span>
                <button onclick="cerrarModal('aulaModal')" style="background:none;border:none;font-size:28px;cursor:pointer;">×</button>
            </div>
            <form id="aulaForm">
                <div class="form-group"><label>Nombre del Aula</label><input type="text" id="aulaName" required></div>
                <input type="hidden" id="editAulaId">
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="cerrarModal('aulaModal')">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Aula</button>
                </div>
            </form>
        </div>
    </div>

    <div id="fileModal" class="modal">
        <div class="modal-content">
            <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
                <span style="font-size:1.2rem;font-weight:600;">📄 Material Educativo</span>
                <button onclick="cerrarModal('fileModal')" style="background:none;border:none;font-size:28px;cursor:pointer;">×</button>
            </div>
            <form id="fileForm">
                <div class="form-group"><label>Título del Material</label><input type="text" id="fileTitle" required></div>
                <div class="form-group"><label>URL del Material</label><input type="url" id="fileUrl" required placeholder="https://drive.google.com/..."></div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="fileType">
                        <option value="pdf">PDF</option>
                        <option value="video">Video</option>
                        <option value="ppt">Presentación</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>
                <input type="hidden" id="editFileId">
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="cerrarModal('fileModal')">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Material</button>
                </div>
            </form>
        </div>
    </div>

    <div id="loader" class="loader"><div class="spinner"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <script>
        // CLIENTE CORE BACKEND
        const client = new Appwrite.Client()
            .setEndpoint('https://cloud.appwrite.io/v1')
            .setProject('PEGA_AQUÍ_TU_PROJECT_ID');

        const databases = new Appwrite.Databases(client);
        const account = new Appwrite.Account(client);

        const DATABASE_ID = 'PEGA_AQUÍ_TU_DATABASE_ID';
        const COLL_AULAS = 'aulas';
        const COLL_FILES = 'files';
        const COLL_TRACKING = 'tracking';

        let aulasCache = [];
        let filesCache = [];
        let trackingCache = [];
        let aulaActualId = null;

        // Sanitización para inyección Cero Vulnerabilidades
        const SecurityUtils = {
            sanitizeInput(str) {
                if (typeof str !== 'string') return str;
                return str.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').trim();
            }
        };

        async function inicializarDatos() {
            try {
                // Verificar sesión administrativa activa
                await account.get();
                
                // Cargas en cascada NoSQL
                const resAulas = await databases.listDocuments(DATABASE_ID, COLL_AULAS);
                aulasCache = resAulas.documents;
                
                const resFiles = await databases.listDocuments(DATABASE_ID, COLL_FILES);
                filesCache = resFiles.documents;

                const resTracking = await databases.listDocuments(DATABASE_ID, COLL_TRACKING);
                trackingCache = resTracking.documents.map(d => JSON.parse(d.data));

                renderizarAulas();
                renderizarSeguimiento();
                actualizarMetricas();
                llenarFiltroAulas();
            } catch (err) {
                console.error("Acceso no autorizado al Panel de Control:", err.message);
                window.location.href = 'index.html';
            } finally {
                document.getElementById('initialLoader').style.display = 'none';
            }
        }

        function actualizarMetricas() {
            document.getElementById('totalAulas').innerText = aulasCache.length;
            document.getElementById('totalArchivos').innerText = filesCache.length;
            
            const estudiantesUnicos = new Set(trackingCache.map(t => t.studentEmail));
            document.getElementById('totalEstudiantes').innerText = estudiantesUnicos.size;
            
            const totalSesiones = trackingCache.reduce((acc, t) => acc + (t.sessions ? t.sessions.length : 0), 0);
            document.getElementById('totalSesiones').innerText = totalSesiones;
        }

        function renderizarAulas() {
            const list = document.getElementById('aulasList');
            list.innerHTML = '';
            aulasCache.forEach(aula => {
                const count = filesCache.filter(f => f.aulaId === aula.$id).length;
                list.innerHTML += `
                    <div class="aula-item">
                        <div>
                            <strong>${aula.name}</strong>
                            <span style="color:#64748b; font-size:0.85rem; margin-left:12px;">(${count} materiales)</span>
                        </div>
                        <div class="actions">
                            <button class="btn-outline" onclick="abrirAula('${aula.$id}', '${aula.name}')">👁️ Ver Contenido</button>
                            <button class="btn-secondary" onclick="mostrarModalAula('${aula.$id}', '${aula.name}')">✏️ Editar</button>
                            <button class="btn-danger" onclick="eliminarAula('${aula.$id}')">🗑️ Eliminar</button>
                        </div>
                    </div>`;
            });
        }

        function abrirAula(id, name) {
            aulaActualId = id;
            document.getElementById('aulaActualTitle').innerText = name;
            document.getElementById('aulasSection').style.display = 'none';
            document.getElementById('filesSection').style.display = 'block';
            renderizarArchivos();
        }

        function volverAulas() {
            aulaActualId = null;
            document.getElementById('aulasSection').style.display = 'block';
            document.getElementById('filesSection').style.display = 'none';
        }

        function renderizarArchivos() {
            const list = document.getElementById('filesList');
            list.innerHTML = '';
            const filtrados = filesCache.filter(f => f.aulaId === aulaActualId);
            
            if (filtrados.length === 0) {
                list.innerHTML = '<p style="padding:20px; color:#64748b;">No hay materiales educativos cargados en esta aula.</p>';
                return;
            }

            filtrados.forEach(file => {
                list.innerHTML += `
                    <div class="file-item">
                        <div>
                            <strong>${file.title}</strong> <span style="font-size:0.8rem; background:#3b82f6; color:white; padding:2px 8px; border-radius:10px;">${file.type}</span>
                            <p style="font-size:0.8rem; color:#64748b;">${file.url}</p>
                        </div>
                        <div class="actions">
                            <button class="btn-secondary" onclick="mostrarModalArchivo('${file.$id}', '${file.title}', '${file.url}', '${file.type}')">✏️ Editar</button>
                            <button class="btn-danger" onclick="eliminarArchivo('${file.$id}')">🗑️ Eliminar</button>
                        </div>
                    </div>`;
            });
        }

        // Formularios y CRUD NoSQL directos a Appwrite
        document.getElementById('aulaForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('editAulaId').value;
            const name = SecurityUtils.sanitizeInput(document.getElementById('aulaName').value);
            
            document.getElementById('loader').classList.add('show');
            try {
                if (id) {
                    await databases.updateDocument(DATABASE_ID, COLL_AULAS, id, { name });
                } else {
                    await databases.createDocument(DATABASE_ID, COLL_AULAS, Appwrite.ID.unique(), { name });
                }
                cerrarModal('aulaModal');
                await inicializarDatos();
            } catch (err) {
                alert("Error al guardar aula: " + err.message);
            } finally {
                document.getElementById('loader').classList.remove('show');
            }
        });

        document.getElementById('fileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('editFileId').value;
            const title = SecurityUtils.sanitizeInput(document.getElementById('fileTitle').value);
            const url = document.getElementById('fileUrl').value.trim();
            const type = document.getElementById('fileType').value;

            document.getElementById('loader').classList.add('show');
            try {
                const data = { aulaId: aulaActualId, title, url, type, createdAt: new Date().toISOString() };
                if (id) {
                    await databases.updateDocument(DATABASE_ID, COLL_FILES, id, data);
                } else {
                    await databases.createDocument(DATABASE_ID, COLL_FILES, Appwrite.ID.unique(), data);
                }
                cerrarModal('fileModal');
                await inicializarDatos();
                renderizarArchivos();
            } catch (err) {
                alert("Error al procesar archivo: " + err.message);
            } finally {
                document.getElementById('loader').classList.remove('show');
            }
        });

        async function eliminarAula(id) {
            if (!confirm("¿Deseas eliminar permanentemente esta aula institucional junto con sus materiales asociados?")) return;
            document.getElementById('loader').classList.add('show');
            try {
                await databases.deleteDocument(DATABASE_ID, COLL_AULAS, id);
                // Cascada lógica manual de materiales
                const vinculados = filesCache.filter(f => f.aulaId === id);
                for (let f of vinculados) {
                    await databases.deleteDocument(DATABASE_ID, COLL_FILES, f.$id);
                }
                await inicializarDatos();
            } catch (err) {
                alert("Error al eliminar aula: " + err.message);
            } finally {
                document.getElementById('loader').classList.remove('show');
            }
        }

        async function eliminarArchivo(id) {
            if (!confirm("¿Eliminar este material?")) return;
            document.getElementById('loader').classList.add('show');
            try {
                await databases.deleteDocument(DATABASE_ID, COLL_FILES, id);
                await inicializarDatos();
                renderizarArchivos();
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                document.getElementById('loader').classList.remove('show');
            }
        }

        function mostrarModalAula(id = '', name = '') {
            document.getElementById('editAulaId').value = id;
            document.getElementById('aulaName').value = name;
            document.getElementById('aulaModal').style.display = 'flex';
        }

        function mostrarModalArchivo(id = '', title = '', url = '', type = 'pdf') {
            document.getElementById('editFileId').value = id;
            document.getElementById('fileTitle').value = title;
            document.getElementById('fileUrl').value = url;
            document.getElementById('fileType').value = type;
            document.getElementById('fileModal').style.display = 'flex';
        }

        function cerrarModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Sistema de Tracking y Renderizado de Progreso Estudiantil
        function renderizarSeguimiento() {
            const container = document.getElementById('progressList');
            container.innerHTML = '';

            if (trackingCache.length === 0) {
                container.innerHTML = '<p style="color:#64748b;">No hay actividad de estudiantes registrada.</p>';
                return;
            }

            trackingCache.forEach((track, index) => {
                const totalVistos = track.sessions?.reduce((sum, s) => sum + (s.aulasVisited?.reduce((acc, v) => acc + (v.materialsViewed?.length || 0), 0) || 0), 0) || 0;
                const totalMateriales = filesCache.length || 1;
                const porcentaje = Math.min(Math.round((totalVistos / totalMateriales) * 100), 100);

                container.innerHTML += `
                    <div class="student-card" id="studentCard-${index}">
                        <div class="student-header" onclick="toggleDetails(${index})">
                            <div>
                                <span class="student-email">${track.studentEmail}</span>
                                <div class="student-stats">
                                    <span>Sesiones: ${track.sessions?.length || 0}</span>
                                    <span>Materiales interactuados: ${totalVistos}</span>
                                </div>
                            </div>
                            <div>
                                <span class="student-badge">${porcentaje}% Progreso</span>
                            </div>
                        </div>
                        <div class="student-details" id="details-${index}">
                            <div class="progress-chart"><div class="progress-fill" style="width: ${porcentaje}%;"></div></div>
                            <h4>Historial Detallado de Interacciones:</h4>
                            ${renderSesiones(track.sessions)}
                        </div>
                    </div>`;
            });
        }

        function renderSesiones(sesiones) {
            if (!sesiones || sesiones.length === 0) return '<p>Sin sesiones iniciadas.</p>';
            return sesiones.map(s => {
                const inicio = new Date(s.sessionStart).toLocaleString('es-VE');
                const fin = s.sessionEnd ? new Date(s.sessionEnd).toLocaleString('es-VE') : 'Sesión Activa';
                return `
                    <div class="session-item">
                        <div class="session-header"><span class="session-date">🗓️ Conexión: ${inicio}</span><span>Hasta: ${fin}</span></div>
                        ${s.aulasVisited?.map(a => `
                            <div class="aula-visit">
                                📁 Aula ID visitada: <strong>${a.aulaId}</strong>
                                ${a.materialsViewed?.map(m => `
                                    <div class="material-view">👁️ Visto: ${m.title} (Permanencia: ${m.duration || 0} segs)</div>
                                `).join('') || '<p style="margin-left:15px; font-size:0.75rem;">Ningún documento abierto.</p>'}
                            </div>
                        `).join('') || '<p style="font-size:0.75rem;">Sin navegación interna.</p>'}
                    </div>`;
            }).join('');
        }

        function toggleDetails(index) {
            const el = document.getElementById(`details-${index}`);
            el.classList.toggle('open');
        }

        function llenarFiltroAulas() {
            const select = document.getElementById('filterAula');
            aulasCache.forEach(a => {
                select.innerHTML += `<option value="${a.$id}">${a.name}</option>`;
            });
        }

        function filtrarEstudiantes() {
            const emailValue = document.getElementById('filterEmail').value.toLowerCase();
            const aulaValue = document.getElementById('filterAula').value;

            trackingCache.forEach((track, index) => {
                const matchesEmail = track.studentEmail.toLowerCase().includes(emailValue);
                let matchesAula = true;
                
                if (aulaValue) {
                    matchesAula = track.sessions?.some(s => s.aulasVisited?.some(a => a.aulaId === aulaValue));
                }

                const card = document.getElementById(`studentCard-${index}`);
                if (card) {
                    card.style.display = (matchesEmail && matchesAula) ? 'block' : 'none';
                }
            });
        }

        function limpiarFiltros() {
            document.getElementById('filterEmail').value = '';
            document.getElementById('filterAula').value = '';
            filtrarEstudiantes();
        }

        function exportarDatos() {
            let csv = 'Email Estudiante,Total Sesiones,Materiales Vistos,Porcentaje Progreso\n';
            trackingCache.forEach(track => {
                const totalVistos = track.sessions?.reduce((sum, s) => sum + (s.aulasVisited?.reduce((acc, v) => acc + (v.materialsViewed?.length || 0), 0) || 0), 0) || 0;
                const porcentaje = Math.min(Math.round((totalVistos / (filesCache.length || 1)) * 100), 100);
                csv += `"${track.studentEmail}",${track.sessions?.length || 0},${totalVistos},${porcentaje}%\n`;
            });
            const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "reporte_auditoria_aula.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function logout() {
            account.deleteSession('current').then(() => {
                window.location.href = 'index.html';
            }).catch(() => {
                window.location.href = 'index.html';
            });
        }

        setInterval(() => {
            document.getElementById('realTimeClock').innerText = new Date().toLocaleTimeString('es-VE');
        }, 1000);

        window.onload = inicializarDatos;
    </script>
</body>
</html>
