<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AULA ONAPC - Panel de Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-image: url('https://lh3.googleusercontent.com/d/1NpP99FHG2AyA8pXlPLtdU7i14S7dTjp7=w1920-h1080');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background: white;
            padding: 14px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 2px solid #3b82f6;
        }

        .navbar h2 { font-size: 1.25rem; font-weight: 600; color: #1e40af; }
        
        .clock {
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            background: #eff6ff;
            padding: 6px 14px;
            border-radius: 40px;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }
        
        .logout-btn {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1e40af;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .logout-btn:hover { background: #dbeafe; }

        .right-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 28px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(240, 249, 255, 0.95);
            padding: 22px;
            border-radius: 28px;
            text-align: center;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .stat-number { font-size: 34px; font-weight: 700; color: #1e40af; margin-bottom: 6px; }
        .stat-card div:last-child { font-size: 0.8rem; color: #1e40af; font-weight: 500; }

        .section {
            background: rgba(248, 250, 252, 0.95);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 28px;
            border: 1px solid rgba(59, 130, 246, 0.25);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .section-header h3 { font-size: 1.2rem; font-weight: 700; color: #1e40af; }

        .btn-primary {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
        .btn-secondary {
            background: #64748b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .btn-danger {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }

        .aula-item, .file-item {
            background: #eff6ff;
            padding: 16px 20px;
            border-radius: 24px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid rgba(59, 130, 246, 0.15);
        }
        .aula-item:hover, .file-item:hover { background: #dbeafe; }
        .aula-item div:first-child strong { font-size: 1rem; font-weight: 600; color: #1e293b; }
        .actions { display: flex; gap: 10px; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 500px;
            width: 90%;
            padding: 28px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e40af;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #334155; font-size: 0.8rem; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 28px;
            font-size: 0.9rem;
        }
        .form-group input:focus { outline: none; border-color: #3b82f6; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }

        .loader {
            position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .loader.show { display: flex; }
        .spinner {
            width: 48px; height: 48px; border: 4px solid #e2e8f0;
            border-top-color: #1e40af; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .progress-item {
            background: #f0f7ff;
            padding: 18px;
            border-radius: 24px;
            margin-bottom: 16px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .progress-header strong { font-weight: 600; color: #1e40af; }
        details summary { cursor: pointer; color: #3b82f6; font-weight: 500; margin-top: 10px; }
        .back-btn { margin-bottom: 20px; }
        
        #initialLoader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }
        .initial-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(30,64,175,0.3);
            border-top-color: #1e40af;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>
    <div id="initialLoader">
        <div class="initial-spinner"></div>
        <p style="color: #1e40af; font-weight: 500;">Cargando panel de control...</p>
    </div>

    <div class="navbar">
        <h2>📚 AULA ONAPC - Panel de Control</h2>
        <div class="right-section">
            <div class="clock" id="realTimeClock">--:--:--</div>
            <button class="logout-btn" onclick="logout()">🚪 Salir</button>
        </div>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-card"><div class="stat-number" id="totalAulas">0</div><div>Total Aulas</div></div>
            <div class="stat-card"><div class="stat-number" id="totalArchivos">0</div><div>Total Archivos</div></div>
            <div class="stat-card"><div class="stat-number" id="totalEstudiantes">0</div><div>Estudiantes</div></div>
        </div>

        <div id="aulasSection" class="section">
            <div class="section-header">
                <h3>📖 Gestión de Aulas</h3>
                <button class="btn-primary" onclick="mostrarModalAula()">+ Nueva Aula</button>
            </div>
            <div id="aulasList"></div>
        </div>

        <div id="filesSection" class="section" style="display: none;">
            <button class="btn-secondary back-btn" onclick="volverAulas()">← Volver a Aulas</button>
            <div class="section-header">
                <h3 id="aulaActualTitle"></h3>
                <button class="btn-primary" onclick="mostrarModalArchivo()">+ Cargar Archivo</button>
            </div>
            <div id="filesList"></div>
        </div>

        <div class="section">
            <div class="section-header"><h3>📊 Progreso de Estudiantes</h3></div>
            <div id="progressList"></div>
        </div>
    </div>

    <div id="aulaModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><span>📁 Nueva Aula</span><button onclick="cerrarModal('aulaModal')" style="background:none;border:none;font-size:28px;cursor:pointer;">&times;</button></div>
            <form id="aulaForm">
                <div class="form-group"><label>Nombre del Aula</label><input type="text" id="aulaName" required></div>
                <input type="hidden" id="editAulaId">
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="cerrarModal('aulaModal')">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="fileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><span>📄 Archivo</span><button onclick="cerrarModal('fileModal')" style="background:none;border:none;font-size:28px;cursor:pointer;">&times;</button></div>
            <form id="fileForm">
                <div class="form-group"><label>Título</label><input type="text" id="fileTitle" required></div>
                <div class="form-group"><label>URL del Archivo</label><input type="url" id="fileUrl" required placeholder="https://..."></div>
                <input type="hidden" id="editFileId">
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="cerrarModal('fileModal')">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="loader" class="loader"><div class="spinner"></div></div>

    <script>
        // Reloj
        function updateClock() {
            const clockElement = document.getElementById('realTimeClock');
            if (clockElement) {
                clockElement.textContent = new Date().toLocaleTimeString('es-ES');
            }
        }
        updateClock();
        setInterval(updateClock, 1000);

        function getBaseUrl() {
            return window.location.href.split('?')[0];
        }

        function redirectToLogin() {
            window.location.replace(getBaseUrl() + '?path=index');
        }

        function showMessage(message) {
            alert('AULA ONAPC dice:\n' + message);
        }

        // Verificar sesión admin
        (function verificarSesion() {
            const sesionAdminActiva = sessionStorage.getItem('adminSessionActive');
            const sessionStart = sessionStorage.getItem('adminSessionStart');
            const OCHO_HORAS = 28800000;
            
            if (!sesionAdminActiva || sesionAdminActiva !== 'true') {
                redirectToLogin();
                return;
            }
            
            if (sessionStart && (Date.now() - parseInt(sessionStart) > OCHO_HORAS)) {
                sessionStorage.removeItem('adminSessionActive');
                sessionStorage.removeItem('adminSessionStart');
                redirectToLogin();
                return;
            }
            
            sessionStorage.setItem('adminSessionStart', Date.now().toString());
        })();

        let aulas = [];
        let aulaActualId = null;
        let vistaActual = 'aulas';

        function mostrarLoader(show) { 
            const el = document.getElementById('loader'); 
            show ? el.classList.add('show') : el.classList.remove('show'); 
        }
        
        function generarId() { 
            return Date.now() + '_' + Math.random().toString(36).substr(2, 9); 
        }
        
        function escapar(texto) { 
            if(!texto) return ''; 
            return texto.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); 
        }
        
        function cerrarModal(id) { 
            document.getElementById(id).style.display = 'none'; 
        }

        function guardarAulas(data) {
            return new Promise((resolve, reject) => {
                google.script.run
                    .withSuccessHandler(res => { 
                        if(res.success) resolve(); 
                        else reject(new Error(res.error)); 
                    })
                    .withFailureHandler(reject)
                    .saveAulas(data);
            });
        }

        async function guardarYRefrescar() {
            mostrarLoader(true);
            try { 
                await guardarAulas(aulas); 
                renderizarAulas(); 
                if(vistaActual === 'files') renderizarArchivos(); 
                actualizarStats();
            } catch(e) { 
                showMessage('Error: ' + e.message);
            } finally { 
                mostrarLoader(false); 
            }
        }

        function renderizarAulas() {
            const container = document.getElementById('aulasList');
            if(!aulas.length) { 
                container.innerHTML = '<p style="text-align:center;padding:32px;color:#64748b;">📭 No hay aulas creadas</p>'; 
                return; 
            }
            let html = '';
            aulas.forEach(a => { 
                html += `<div class="aula-item">
                            <div>
                                <strong>${escapar(a.name)}</strong>
                                <br><span style="font-size:12px;color:#64748b;">📄 ${a.files?.length || 0} archivos</span>
                            </div>
                            <div class="actions">
                                <button class="btn-primary" onclick="entrarAula('${a.id}')" style="padding:6px 16px;">📂 Ver</button>
                                <button class="btn-secondary" onclick="editarAula('${a.id}')" style="padding:6px 16px;">✏️</button>
                                <button class="btn-danger" onclick="eliminarAula('${a.id}')" style="padding:6px 16px;">🗑️</button>
                            </div>
                        </div>`; 
            });
            container.innerHTML = html;
            actualizarStats();
        }

        function renderizarArchivos() {
            const aula = aulas.find(a => a.id === aulaActualId);
            const container = document.getElementById('filesList');
            if(!aula || !aula.files?.length) { 
                container.innerHTML = '<p style="text-align:center;padding:32px;color:#64748b;">📭 No hay archivos en esta aula</p>'; 
                return; 
            }
            let html = '';
            aula.files.forEach(f => { 
                html += `<div class="file-item">
                            <div>
                                <strong>${escapar(f.title)}</strong>
                                <br><span style="font-size:11px;color:#94a3b8;">${escapar(f.url)}</span>
                            </div>
                            <div class="actions">
                                <a href="${escapar(f.url)}" target="_blank" class="btn-primary" style="text-decoration:none;padding:6px 16px;">👁️ Ver</a>
                                <button class="btn-secondary" onclick="editarArchivo('${f.id}')" style="padding:6px 16px;">✏️</button>
                                <button class="btn-danger" onclick="eliminarArchivo('${f.id}')" style="padding:6px 16px;">🗑️</button>
                            </div>
                        </div>`; 
            });
            container.innerHTML = html;
        }

        function renderizarProgreso(progressData) {
            const container = document.getElementById('progressList');
            const estudiantes = Object.keys(progressData);
            document.getElementById('totalEstudiantes').innerText = estudiantes.length;
            if(!estudiantes.length) { 
                container.innerHTML = '<p style="text-align:center;padding:32px;color:#64748b;">📊 No hay estudiantes registrados</p>'; 
                return; 
            }
            let html = '';
            estudiantes.forEach(email => {
                const data = progressData[email];
                const sessions = data.sessions || [];
                html += `<div class="progress-item">
                            <div class="progress-header">
                                <strong>📧 ${escapar(email)}</strong>
                                <span>📊 Sesiones: ${sessions.length}</span>
                            </div>
                            <details>
                                <summary>Ver detalles</summary>
                                <div style="margin-top:12px;">
                                    ${sessions.map((s, idx) => `<div style="margin-bottom:10px;padding:10px;background:white;border-radius:20px;font-size:0.85rem;">
                                        <p><strong>Sesión ${idx+1}</strong> - ${new Date(s.sessionStart).toLocaleString()}</p>
                                        <p>Aulas visitadas: ${s.aulasVisited?.length || 0}</p>
                                    </div>`).join('')}
                                </div>
                            </details>
                        </div>`;
            });
            container.innerHTML = html;
        }

        function actualizarStats() {
            const totalAulas = aulas.length;
            const totalArchivos = aulas.reduce((acc, a) => acc + (a.files?.length || 0), 0);
            document.getElementById('totalAulas').innerText = totalAulas;
            document.getElementById('totalArchivos').innerText = totalArchivos;
        }

        function mostrarModalAula(editId = null) {
            document.getElementById('aulaName').value = editId ? aulas.find(a => a.id === editId).name : '';
            document.getElementById('editAulaId').value = editId || '';
            document.getElementById('aulaModal').style.display = 'flex';
        }
        
        function editarAula(id) { mostrarModalAula(id); }
        
        document.getElementById('aulaForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            const name = document.getElementById('aulaName').value.trim();
            const editId = document.getElementById('editAulaId').value;
            if(!name) return;
            if(editId) { 
                const idx = aulas.findIndex(a => a.id === editId); 
                if(idx !== -1) aulas[idx].name = name; 
            } else { 
                aulas.push({ id: generarId(), name, files: [] }); 
            }
            await guardarYRefrescar();
            cerrarModal('aulaModal');
        });
        
        async function eliminarAula(id) {
            if(!confirm('¿Eliminar esta aula y todos sus archivos?')) return;
            aulas = aulas.filter(a => a.id !== id);
            if(aulaActualId === id) volverAulas();
            await guardarYRefrescar();
        }

        function entrarAula(id) { 
            aulaActualId = id; 
            vistaActual = 'files'; 
            const aula = aulas.find(a => a.id === id); 
            document.getElementById('aulaActualTitle').innerHTML = `📖 ${escapar(aula.name)}`; 
            document.getElementById('aulasSection').style.display = 'none'; 
            document.getElementById('filesSection').style.display = 'block'; 
            renderizarArchivos(); 
        }
        
        function volverAulas() { 
            vistaActual = 'aulas'; 
            aulaActualId = null; 
            document.getElementById('aulasSection').style.display = 'block'; 
            document.getElementById('filesSection').style.display = 'none'; 
            renderizarAulas(); 
        }
        
        function mostrarModalArchivo(fileId = null) {
            const aula = aulas.find(a => a.id === aulaActualId);
            if(fileId) { 
                const f = aula.files.find(f => f.id === fileId); 
                document.getElementById('fileTitle').value = f.title; 
                document.getElementById('fileUrl').value = f.url; 
                document.getElementById('editFileId').value = fileId; 
            } else { 
                document.getElementById('fileTitle').value = ''; 
                document.getElementById('fileUrl').value = ''; 
                document.getElementById('editFileId').value = ''; 
            }
            document.getElementById('fileModal').style.display = 'flex';
        }
        
        function editarArchivo(fileId) { mostrarModalArchivo(fileId); }
        
        document.getElementById('fileForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            const title = document.getElementById('fileTitle').value.trim();
            const url = document.getElementById('fileUrl').value.trim();
            const editId = document.getElementById('editFileId').value;
            const aula = aulas.find(a => a.id === aulaActualId);
            if(!aula) return;
            if(editId) { 
                const idx = aula.files.findIndex(f => f.id === editId); 
                if(idx !== -1) { 
                    aula.files[idx].title = title; 
                    aula.files[idx].url = url; 
                } 
            } else { 
                aula.files.push({ id: generarId(), title, url }); 
            }
            await guardarYRefrescar();
            cerrarModal('fileModal');
        });
        
        async function eliminarArchivo(fileId) {
            if(!confirm('¿Eliminar este archivo?')) return;
            const aula = aulas.find(a => a.id === aulaActualId);
            if(aula) { 
                aula.files = aula.files.filter(f => f.id !== fileId); 
                await guardarYRefrescar(); 
            }
        }

        function logout() {
            sessionStorage.removeItem('adminSessionActive');
            sessionStorage.removeItem('adminSessionStart');
            sessionStorage.removeItem('studentEmail');
            localStorage.removeItem('studentEmail');
            window.location.replace(getBaseUrl() + '?path=index');
        }

        // Inicialización
        (async function init() {
            google.script.run
                .withSuccessHandler(res => {
                    if (res && res.success) {
                        aulas = res.aulas || [];
                        renderizarAulas();
                        renderizarProgreso(res.progress || {});
                        document.getElementById('initialLoader').style.display = 'none';
                    } else {
                        showMessage('Error: ' + (res ? res.error : 'No hay respuesta'));
                        document.getElementById('initialLoader').style.display = 'none';
                    }
                })
                .withFailureHandler(err => {
                    console.error('Error:', err);
                    document.getElementById('initialLoader').style.display = 'none';
                    showMessage('Error al cargar datos: ' + err.message);
                })
                .getAdminInitialData();
        })();
    </script>
</body>
</html>
