<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AULA ONAPC - Mi Aula</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-image: url('https://lh3.googleusercontent.com/d/1NpP99FHG2AyA8pXlPLtdU7i14S7dTjp7=w1920-h1080');
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }
        .navbar {
            background: white;
            padding: 14px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3b82f6;
        }
        .clock { background: #eff6ff; padding: 6px 14px; border-radius: 40px; font-family: monospace; }
        .logout-btn { background: #eff6ff; border: 1px solid #bfdbfe; padding: 8px 24px; border-radius: 40px; cursor: pointer; }
        .right-section { display: flex; gap: 16px; align-items: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 28px; }
        .welcome { background: linear-gradient(135deg,#1e40af,#3b82f6); color: white; padding: 28px; border-radius: 32px; margin-bottom: 32px; }
        .aulas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 24px; }
        .aula-card { background: white; border-radius: 28px; overflow: hidden; cursor: pointer; border: 1px solid #e2e8f0; transition: 0.2s; }
        .aula-card:hover { transform: translateY(-3px); border-color: #3b82f6; }
        .aula-header { background: #f8fafc; padding: 18px 20px; }
        .aula-header h3 { color: #1e40af; }
        .aula-body { padding: 20px; }
        .progress-bar { height: 6px; background: #e2e8f0; border-radius: 10px; margin-top: 12px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg,#1e40af,#3b82f6); width: 0%; }
        .files-list { display: flex; flex-direction: column; gap: 12px; }
        .file-item { background: white; padding: 16px 20px; border-radius: 28px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; }
        .view-btn { background: linear-gradient(135deg,#1e40af,#3b82f6); border: none; color: white; padding: 8px 24px; border-radius: 40px; cursor: pointer; }
        .back-btn { background: #64748b; color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; margin-bottom: 24px; }
        .empty-state { text-align: center; padding: 60px; background: white; border-radius: 32px; color: #64748b; }
        .loader { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .loader.show { display: flex; }
        .spinner { width: 48px; height: 48px; border: 4px solid #e2e8f0; border-top-color: #1e40af; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #initialLoader { position: fixed; top:0; left:0; right:0; bottom:0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
        .initial-spinner { width: 48px; height: 48px; border: 4px solid #e2e8f0; border-top-color: #1e40af; border-radius: 50%; animation: spin 0.8s linear infinite; }
    </style>
</head>
<body>
    <div id="initialLoader"><div class="initial-spinner"></div><p style="color:#1e40af;">Cargando tu aula virtual...</p></div>
    <div class="navbar">
        <h2>📚 AULA ONAPC</h2>
        <div class="right-section"><div class="clock" id="realTimeClock">--:--:--</div><button class="logout-btn" onclick="logout()">🚪 Salir</button></div>
    </div>
    <div class="container">
        <div class="welcome"><h1>Bienvenido</h1><p id="studentEmailDisplay">Cargando...</p></div>
        <div id="aulasView"><div id="aulasList" class="aulas-grid"></div></div>
        <div id="filesView" style="display:none;"><button class="back-btn" onclick="volverAulas()">← Volver</button><h2 id="aulaTitle" style="margin-bottom:20px;color:#1e40af;"></h2><div id="filesList" class="files-list"></div></div>
    </div>
    <div id="loader" class="loader"><div class="spinner"></div></div>
    <script>
        function updateClock() { document.getElementById('realTimeClock').innerText = new Date().toLocaleTimeString('es-ES'); }
        updateClock(); setInterval(updateClock, 1000);
        
        function redirectToLogin() { window.location.href = 'index.html'; }
        
        (function() { 
            if(!sessionStorage.getItem('studentEmail') && !localStorage.getItem('studentEmail')) redirectToLogin(); 
        })();
        
        let email = sessionStorage.getItem('studentEmail') || localStorage.getItem('studentEmail');
        document.getElementById('studentEmailDisplay').innerText = email || 'Estudiante';
        
        // Cargar datos desde el almacenamiento compartido
        let aulas = JSON.parse(localStorage.getItem('aulas_onapc') || '[{"id":"1","name":"Matemáticas","files":[{"id":"f1","title":"Álgebra","url":"https://youtu.be/dQw4w9WgXcQ"}]},{"id":"2","name":"Programación","files":[{"id":"f2","title":"HTML","url":"https://youtu.be/dQw4w9WgXcQ"}]}]');
        
        // Cargar progreso del estudiante actual
        let progresoGeneral = JSON.parse(localStorage.getItem('progreso_onapc') || '{}');
        let progreso = progresoGeneral[email] || { sessions: [] };
        let sesionActual = { sessionId: Date.now()+'_'+Math.random().toString(36).substr(2,6), sessionStart: new Date().toISOString(), sessionEnd: null, aulasVisited: [] };
        progreso.sessions.push(sesionActual);
        
        function guardarProgresoGlobal() {
            progresoGeneral[email] = progreso;
            localStorage.setItem('progreso_onapc', JSON.stringify(progresoGeneral));
        }
        guardarProgresoGlobal();
        
        let aulaActualId = null, timeout = null;
        function debouncedSave() { if(timeout) clearTimeout(timeout); timeout = setTimeout(() => guardarProgresoGlobal(), 900); }
        
        function registrarEntradaAula(id, name) { 
            if(aulaActualId) registrarSalidaAula(); 
            aulaActualId=id; 
            sesionActual.aulasVisited.push({ aulaId:id, aulaName:name, entryTime:new Date().toISOString(), exitTime:null, materialsViewed:[] }); 
            debouncedSave(); 
        }
        
        function registrarSalidaAula() { 
            let v = sesionActual.aulasVisited.find(v=>v.aulaId===aulaActualId && !v.exitTime); 
            if(v) v.exitTime=new Date().toISOString(); 
            aulaActualId=null; 
            debouncedSave(); 
        }
        
        function registrarVista(aulaId, fileId, title) { 
            let v = sesionActual.aulasVisited.find(v=>v.aulaId===aulaId && !v.exitTime); 
            if(!v) { 
                let a=aulas.find(a=>a.id===aulaId); 
                v={ aulaId, aulaName:a?.name, entryTime:new Date().toISOString(), exitTime:null, materialsViewed:[] }; 
                sesionActual.aulasVisited.push(v); 
            } 
            let m = v.materialsViewed.find(m=>m.fileId===fileId); 
            if(!m) { 
                m={ fileId, fileTitle:title, viewCount:0, firstView:new Date().toISOString(), lastView:null }; 
                v.materialsViewed.push(m); 
            } 
            m.viewCount++; 
            m.lastView=new Date().toISOString(); 
            debouncedSave(); 
        }
        
        function escapar(t) { return t ? t.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) : ''; }
        
        function renderizarAulas() {
            let html = '';
            aulas.forEach(a => { 
                let visit = sesionActual.aulasVisited.find(v=>v.aulaId===a.id); 
                let vistos = visit?.materialsViewed?.length||0; 
                let total = a.files?.length||0; 
                let pct = total ? (vistos/total)*100 : 0; 
                html += `<div class="aula-card" onclick="entrarAula('${a.id}')">
                            <div class="aula-header"><h3>${escapar(a.name)}</h3></div>
                            <div class="aula-body">
                                <div>📄 ${total} materiales | 👁️ ${vistos} vistos</div>
                                <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                            </div>
                         </div>`; 
            });
            document.getElementById('aulasList').innerHTML = html || '<div class="empty-state">📭 No hay aulas</div>';
        }
        
        function renderizarArchivos(id) { 
            let a = aulas.find(a=>a.id===id); 
            let html = ''; 
            a?.files.forEach(f => { 
                html += `<div class="file-item">
                            <div><strong>${escapar(f.title)}</strong></div>
                            <button class="view-btn" onclick="abrirMaterial('${a.id}','${f.id}','${escapar(f.title)}','${escapar(f.url)}')">📖 Ver</button>
                         </div>`; 
            }); 
            document.getElementById('filesList').innerHTML = html || '<div class="empty-state">📭 Sin materiales</div>'; 
        }
        
        function entrarAula(id) { 
            let a = aulas.find(a=>a.id===id); 
            if(a) { 
                registrarEntradaAula(id, a.name); 
                document.getElementById('aulaTitle').innerHTML = `📖 ${escapar(a.name)}`; 
                document.getElementById('aulasView').style.display='none'; 
                document.getElementById('filesView').style.display='block'; 
                renderizarArchivos(id); 
            } 
        }
        
        function volverAulas() { 
            registrarSalidaAula(); 
            document.getElementById('aulasView').style.display='block'; 
            document.getElementById('filesView').style.display='none'; 
            renderizarAulas(); 
        }
        
        function getDriveDownloadUrl(url) {
            // Detecta URLs de Google Drive
            const driveMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (driveMatch && driveMatch[1]) {
                const fileId = driveMatch[1];
                // Usamos el enlace de vista previa/descarga directa
                return `https://drive.google.com/uc?export=download&id=${fileId}`;
            }
            return url;
        }
        
        function abrirMaterial(aulaId, fileId, title, url) { 
            registrarVista(aulaId, fileId, title); 
            const finalUrl = getDriveDownloadUrl(url);
            window.open(finalUrl, '_blank'); 
        }
        
        function logout() { 
            registrarSalidaAula(); 
            sesionActual.sessionEnd = new Date().toISOString(); 
            guardarProgresoGlobal(); 
            sessionStorage.clear(); 
            localStorage.removeItem('studentEmail'); 
            window.location.href = 'index.html'; 
        }
        
        window.addEventListener('beforeunload', () => { 
            if(sesionActual) { 
                registrarSalidaAula(); 
                sesionActual.sessionEnd = new Date().toISOString(); 
                guardarProgresoGlobal(); 
            } 
        });
        
        renderizarAulas();
        setTimeout(()=>document.getElementById('initialLoader').style.display='none', 800);
    </script>
</body>
</html>
