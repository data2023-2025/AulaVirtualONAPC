<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AULA ONAPC - Mi Aula</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-image: url('https://lh3.googleusercontent.com/d/1NpP99FHG2AyA8pXlPLtdU7i14S7dTjp7=w1920-h1080');
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }
        .navbar {
            background: white;
            padding: 14px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3b82f6;
            flex-wrap: wrap;
            gap: 12px;
        }
        .clock { background: #eff6ff; padding: 6px 14px; border-radius: 40px; font-family: monospace; }
        .logout-btn { background: #eff6ff; border: 1px solid #bfdbfe; padding: 8px 24px; border-radius: 40px; cursor: pointer; }
        .right-section { display: flex; gap: 16px; align-items: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 28px; }
        .welcome { background: linear-gradient(135deg,#1e40af,#3b82f6); color: white; padding: 28px; border-radius: 32px; margin-bottom: 32px; }
        .aulas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 24px; }
        .aula-card { background: white; border-radius: 28px; overflow: hidden; cursor: pointer; border: 1px solid #e2e8f0; transition: 0.2s; }
        .aula-card:hover { transform: translateY(-3px); border-color: #3b82f6; }
        .aula-header { background: #f8fafc; padding: 18px 20px; }
        .aula-header h3 { color: #1e40af; }
        .aula-body { padding: 20px; }
        .progress-bar { height: 6px; background: #e2e8f0; border-radius: 10px; margin-top: 12px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg,#1e40af,#3b82f6); width: 0%; }
        .files-list { display: flex; flex-direction: column; gap: 12px; }
        .file-item { background: white; padding: 16px 20px; border-radius: 28px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; flex-wrap: wrap; gap: 12px; }
        .view-btn { background: linear-gradient(135deg,#1e40af,#3b82f6); border: none; color: white; padding: 8px 24px; border-radius: 40px; cursor: pointer; }
        .back-btn { background: #64748b; color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; margin-bottom: 24px; }
        .empty-state { text-align: center; padding: 60px; background: white; border-radius: 32px; color: #64748b; }
        .loader { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .loader.show { display: flex; }
        .spinner { width: 48px; height: 48px; border: 4px solid #e2e8f0; border-top-color: #1e40af; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #initialLoader { position: fixed; top:0; left:0; right:0; bottom:0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
        .initial-spinner { width: 48px; height: 48px; border: 4px solid #e2e8f0; border-top-color: #1e40af; border-radius: 50%; animation: spin 0.8s linear infinite; }
        
        /* Modal para visualizar materiales */
        .material-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .material-modal.active { display: flex; }
        .modal-container {
            background: white;
            border-radius: 32px;
            width: 90%;
            max-width: 1200px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            padding: 16px 24px;
            background: #1e40af;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 { font-size: 1.2rem; }
        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
        }
        .modal-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8fafc;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: black;
            border-radius: 16px;
        }
        .video-container iframe,
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .pdf-viewer {
            width: 100%;
            height: 70vh;
            border: none;
            border-radius: 16px;
        }
        .download-option {
            text-align: center;
            margin-top: 20px;
            padding: 16px;
            background: #eff6ff;
            border-radius: 28px;
        }
        .download-btn {
            background: linear-gradient(135deg,#1e40af,#3b82f6);
            color: white;
            padding: 12px 32px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
        }
        .warning-message {
            background: #fef3c7;
            color: #92400e;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .file-info { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
    </style>
</head>
<body>
    <div id="initialLoader"><div class="initial-spinner"></div><p style="color:#1e40af;">Cargando tu aula virtual...</p></div>
    
    <div class="navbar">
        <h2>📚 AULA ONAPC</h2>
        <div class="right-section">
            <div class="clock" id="realTimeClock">--:--:--</div>
            <button class="logout-btn" onclick="logout()">🚪 Salir</button>
        </div>
    </div>
    
    <div class="container">
        <div class="welcome">
            <h1>Bienvenido</h1>
            <p id="studentEmailDisplay">Cargando...</p>
        </div>
        
        <div id="aulasView">
            <div id="aulasList" class="aulas-grid"></div>
        </div>
        
        <div id="filesView" style="display:none;">
            <button class="back-btn" onclick="volverAulas()">← Volver a Aulas</button>
            <h2 id="aulaTitle" style="margin-bottom:20px;color:#1e40af;"></h2>
            <div id="filesList" class="files-list"></div>
        </div>
    </div>
    
    <div id="materialModal" class="material-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modalTitle">Cargando...</h3>
                <button class="close-modal" onclick="cerrarModal()">&times;</button>
            </div>
            <div class="modal-content" id="modalContent">
                <div style="text-align:center;padding:40px;">Cargando contenido...</div>
            </div>
        </div>
    </div>
    
    <div id="loader" class="loader"><div class="spinner"></div></div>
    
    <script>
        // ============ CONFIGURACIÓN INICIAL ============
        function updateClock() {
            document.getElementById('realTimeClock').innerText = new Date().toLocaleTimeString('es-ES');
        }
        updateClock();
        setInterval(updateClock, 1000);
        
        function redirectToLogin() { window.location.href = 'index.html'; }
        
        (function() {
            if (!sessionStorage.getItem('studentEmail') && !localStorage.getItem('studentEmail')) redirectToLogin();
        })();
        
        let email = sessionStorage.getItem('studentEmail') || localStorage.getItem('studentEmail');
        document.getElementById('studentEmailDisplay').innerText = email || 'Estudiante';
        
        // Cargar datos
        let aulas = JSON.parse(localStorage.getItem('aulas_onapc') || '[{"id":"1","name":"Matemáticas","files":[{"id":"f1","title":"Álgebra","url":"https://youtu.be/dQw4w9WgXcQ"}]},{"id":"2","name":"Programación","files":[{"id":"f2","title":"HTML","url":"https://youtu.be/dQw4w9WgXcQ"}]}]');
        
        let progresoGeneral = JSON.parse(localStorage.getItem('progreso_onapc') || '{}');
        let progreso = progresoGeneral[email] || { sessions: [] };
        
        // Crear nueva sesión
        let sesionActual = {
            sessionId: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            sessionStart: new Date().toISOString(),
            sessionEnd: null,
            aulasVisited: []
        };
        progreso.sessions.push(sesionActual);
        
        function guardarProgresoGlobal() {
            progresoGeneral[email] = progreso;
            localStorage.setItem('progreso_onapc', JSON.stringify(progresoGeneral));
        }
        guardarProgresoGlobal();
        
        // Variables de seguimiento de tiempo
        let aulaActualId = null;
        let aulaEntryTime = null;
        let materialActualId = null;
        let materialEntryTime = null;
        let heartbeatInterval = null;
        
        // Heartbeat: cada 30 segundos guarda el tiempo acumulado
        function iniciarHeartbeat() {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            heartbeatInterval = setInterval(() => {
                guardarTiemposActuales();
            }, 30000); // Cada 30 segundos
        }
        
        function guardarTiemposActuales() {
            // Guardar tiempo en aula actual
            if (aulaActualId && aulaEntryTime) {
                const visit = sesionActual.aulasVisited.find(v => v.aulaId === aulaActualId && !v.exitTime);
                if (visit) {
                    const tiempoActual = Date.now() - new Date(aulaEntryTime).getTime();
                    visit.timeSpentMs = tiempoActual;
                }
            }
            
            // Guardar tiempo en material actual
            if (materialActualId && materialEntryTime && aulaActualId) {
                const visit = sesionActual.aulasVisited.find(v => v.aulaId === aulaActualId && !v.exitTime);
                if (visit) {
                    const material = visit.materialsViewed?.find(m => m.fileId === materialActualId);
                    if (material) {
                        const tiempoActual = Date.now() - new Date(materialEntryTime).getTime();
                        material.timeSpentMs = tiempoActual;
                    }
                }
            }
            
            guardarProgresoGlobal();
        }
        
        function registrarEntradaAula(id, name) {
            // Salir del aula anterior si existe
            if (aulaActualId) registrarSalidaAula();
            
            aulaActualId = id;
            aulaEntryTime = new Date();
            
            // Verificar si ya existe una visita a esta aula en la sesión actual sin salida
            let visit = sesionActual.aulasVisited.find(v => v.aulaId === id && !v.exitTime);
            if (!visit) {
                visit = {
                    aulaId: id,
                    aulaName: name,
                    entryTime: aulaEntryTime.toISOString(),
                    exitTime: null,
                    materialsViewed: [],
                    timeSpentMs: 0
                };
                sesionActual.aulasVisited.push(visit);
            } else {
                // Reactivar visita existente
                visit.entryTime = aulaEntryTime.toISOString();
                visit.exitTime = null;
            }
            
            guardarProgresoGlobal();
        }
        
        function registrarSalidaAula() {
            if (aulaActualId && aulaEntryTime) {
                const visit = sesionActual.aulasVisited.find(v => v.aulaId === aulaActualId && !v.exitTime);
                if (visit) {
                    visit.exitTime = new Date().toISOString();
                    visit.timeSpentMs = Date.now() - new Date(aulaEntryTime).getTime();
                }
            }
            aulaActualId = null;
            aulaEntryTime = null;
            guardarProgresoGlobal();
        }
        
        function registrarInicioMaterial(aulaId, fileId, title) {
            // Cerrar material anterior
            if (materialActualId) registrarFinMaterial();
            
            materialActualId = fileId;
            materialEntryTime = new Date();
            
            // Buscar o crear la visita al aula
            let visit = sesionActual.aulasVisited.find(v => v.aulaId === aulaId && !v.exitTime);
            if (!visit) {
                const aula = aulas.find(a => a.id === aulaId);
                visit = {
                    aulaId: aulaId,
                    aulaName: aula?.name || 'Aula',
                    entryTime: new Date().toISOString(),
                    exitTime: null,
                    materialsViewed: [],
                    timeSpentMs: 0
                };
                sesionActual.aulasVisited.push(visit);
            }
            
            // Registrar o actualizar material
            let material = visit.materialsViewed?.find(m => m.fileId === fileId);
            if (!material) {
                material = {
                    fileId: fileId,
                    fileTitle: title,
                    viewCount: 0,
                    firstView: null,
                    lastView: null,
                    timeSpentMs: 0
                };
                if (!visit.materialsViewed) visit.materialsViewed = [];
                visit.materialsViewed.push(material);
            }
            
            material.viewCount++;
            if (!material.firstView) material.firstView = materialEntryTime.toISOString();
            material.lastView = materialEntryTime.toISOString();
            
            guardarProgresoGlobal();
        }
        
        function registrarFinMaterial() {
            if (materialActualId && materialEntryTime && aulaActualId) {
                const visit = sesionActual.aulasVisited.find(v => v.aulaId === aulaActualId && !v.exitTime);
                if (visit && visit.materialsViewed) {
                    const material = visit.materialsViewed.find(m => m.fileId === materialActualId);
                    if (material) {
                        const tiempoVisto = Date.now() - new Date(materialEntryTime).getTime();
                        material.timeSpentMs = (material.timeSpentMs || 0) + tiempoVisto;
                    }
                }
            }
            materialActualId = null;
            materialEntryTime = null;
            guardarProgresoGlobal();
        }
        
        // ============ VISOR DE MATERIALES ============
        function getGoogleDriveId(url) {
            const patterns = [
                /\/file\/d\/([a-zA-Z0-9_-]+)/,
                /id=([a-zA-Z0-9_-]+)/,
                /\/d\/([a-zA-Z0-9_-]+)/,
                /uc\?id=([a-zA-Z0-9_-]+)/,
                /open\?id=([a-zA-Z0-9_-]+)/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match && match[1]) return match[1];
            }
            return null;
        }
        
        function getFileType(url) {
            const driveId = getGoogleDriveId(url);
            if (driveId) return 'google-drive';
            const urlLower = url.toLowerCase();
            if (urlLower.includes('youtube.com') || urlLower.includes('youtu.be')) return 'youtube';
            if (urlLower.includes('vimeo.com')) return 'vimeo';
            if (urlLower.endsWith('.pdf')) return 'pdf';
            if (urlLower.endsWith('.mp4') || urlLower.endsWith('.webm') || urlLower.endsWith('.mov')) return 'video-directo';
            if (urlLower.match(/\.(ppt|pptx|doc|docx|xls|xlsx)$/)) return 'office';
            return 'unknown';
        }
        
        function generarVisorMaterial(title, url) {
            const type = getFileType(url);
            const driveId = getGoogleDriveId(url);
            
            switch (type) {
                case 'youtube':
                    let youtubeId = '';
                    const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^\&\?]+)/);
                    if (ytMatch) youtubeId = ytMatch[1];
                    return `
                        <div class="video-container">
                            <iframe src="https://www.youtube.com/embed/${youtubeId}" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <div class="download-option">
                            <a href="${url}" class="download-btn" target="_blank">📺 Abrir en YouTube</a>
                        </div>
                    `;
                case 'vimeo':
                    const vimeoMatch = url.match(/vimeo\.com\/(\d+)/);
                    const vimeoId = vimeoMatch ? vimeoMatch[1] : '';
                    return `
                        <div class="video-container">
                            <iframe src="https://player.vimeo.com/video/${vimeoId}" frameborder="0" allowfullscreen></iframe>
                        </div>
                    `;
                case 'google-drive':
                    if (driveId) {
                        return `
                            <div class="video-container">
                                <iframe src="https://drive.google.com/file/d/${driveId}/preview" frameborder="0" allowfullscreen></iframe>
                            </div>
                            <div class="download-option">
                                <p>⚠️ Si el archivo no se visualiza (archivos muy grandes), puedes descargarlo:</p>
                                <a href="https://drive.google.com/uc?export=download&id=${driveId}" class="download-btn" target="_blank">⬇️ Descargar archivo</a>
                            </div>
                        `;
                    }
                    return `<div class="warning-message">⚠️ No se pudo procesar el enlace de Google Drive.</div>
                            <div class="download-option"><a href="${url}" class="download-btn" target="_blank">📥 Abrir en Google Drive</a></div>`;
                case 'pdf':
                    return `<iframe class="pdf-viewer" src="${url}" frameborder="0"></iframe>
                            <div class="download-option"><a href="${url}" class="download-btn" download target="_blank">⬇️ Descargar PDF</a></div>`;
                case 'video-directo':
                    return `<div class="video-container"><video controls autoplay><source src="${url}" type="video/mp4">Tu navegador no soporta video.</video></div>
                            <div class="download-option"><a href="${url}" class="download-btn" download target="_blank">⬇️ Descargar video</a></div>`;
                case 'office':
                    const encodedUrl = encodeURIComponent(url);
                    return `<iframe class="pdf-viewer" src="https://view.officeapps.live.com/op/embed.aspx?src=${encodedUrl}" frameborder="0"></iframe>
                            <div class="download-option"><a href="${url}" class="download-btn" target="_blank">📥 Abrir documento</a></div>`;
                default:
                    return `<div class="warning-message">⚠️ No se puede visualizar este tipo de archivo automáticamente.</div>
                            <div class="download-option"><a href="${url}" class="download-btn" target="_blank">🔗 Abrir enlace</a></div>`;
            }
        }
        
        let modalOpen = false;
        
        function abrirMaterial(aulaId, fileId, title, url) {
            registrarInicioMaterial(aulaId, fileId, title);
            modalOpen = true;
            
            const modal = document.getElementById('materialModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            
            modalTitle.textContent = title;
            modalContent.innerHTML = generarVisorMaterial(title, url);
            modal.classList.add('active');
        }
        
        function cerrarModal() {
            registrarFinMaterial();
            modalOpen = false;
            const modal = document.getElementById('materialModal');
            modal.classList.remove('active');
            document.getElementById('modalContent').innerHTML = '<div style="text-align:center;padding:40px;">Cargando contenido...</div>';
        }
        
        // ============ RENDERIZADO ============
        function escapar(t) { return t ? t.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) : ''; }
        
        function renderizarAulas() {
            let html = '';
            aulas.forEach(a => {
                let visit = sesionActual.aulasVisited.find(v => v.aulaId === a.id);
                let vistos = visit?.materialsViewed?.length || 0;
                let total = a.files?.length || 0;
                let pct = total ? (vistos / total) * 100 : 0;
                html += `<div class="aula-card" onclick="entrarAula('${a.id}')">
                            <div class="aula-header"><h3>${escapar(a.name)}</h3></div>
                            <div class="aula-body">
                                <div>📄 ${total} materiales | 👁️ ${vistos} vistos</div>
                                <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                            </div>
                         </div>`;
            });
            document.getElementById('aulasList').innerHTML = html || '<div class="empty-state">📭 No hay aulas disponibles</div>';
        }
        
        function renderizarArchivos(id) {
            let a = aulas.find(a => a.id === id);
            let html = '';
            if (!a || !a.files?.length) {
                html = '<div class="empty-state">📭 Esta aula aún no tiene materiales</div>';
            } else {
                a.files.forEach(f => {
                    html += `<div class="file-item">
                                <div>
                                    <strong>${escapar(f.title)}</strong>
                                    <div class="file-info">📎 ${f.url.substring(0, 60)}${f.url.length > 60 ? '...' : ''}</div>
                                </div>
                                <button class="view-btn" onclick="abrirMaterial('${a.id}','${f.id}','${escapar(f.title)}','${escapar(f.url)}')">📖 Ver / Estudiar</button>
                             </div>`;
                });
            }
            document.getElementById('filesList').innerHTML = html;
        }
        
        function entrarAula(id) {
            let a = aulas.find(a => a.id === id);
            if (a) {
                registrarEntradaAula(id, a.name);
                document.getElementById('aulaTitle').innerHTML = `📖 ${escapar(a.name)}`;
                document.getElementById('aulasView').style.display = 'none';
                document.getElementById('filesView').style.display = 'block';
                renderizarArchivos(id);
            }
        }
        
        function volverAulas() {
            registrarSalidaAula();
            document.getElementById('aulasView').style.display = 'block';
            document.getElementById('filesView').style.display = 'none';
            renderizarAulas();
        }
        
        function logout() {
            registrarSalidaAula();
            if (modalOpen) cerrarModal();
            sesionActual.sessionEnd = new Date().toISOString();
            guardarProgresoGlobal();
            sessionStorage.clear();
            localStorage.removeItem('studentEmail');
            window.location.href = 'index.html';
        }
        
        window.addEventListener('beforeunload', () => {
            if (sesionActual) {
                registrarSalidaAula();
                if (modalOpen) registrarFinMaterial();
                sesionActual.sessionEnd = new Date().toISOString();
                guardarProgresoGlobal();
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') cerrarModal();
        });
        
        // Iniciar heartbeat y renderizar
        iniciarHeartbeat();
        renderizarAulas();
        setTimeout(() => document.getElementById('initialLoader').style.display = 'none', 800);
    </script>
</body>
</html>
