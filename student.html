<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AULA ONAPC - Mi Aula</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://cloud.appwrite.io; img-src 'self' data: https://*.googleusercontent.com; frame-src 'self' https://drive.google.com https://docs.google.com https://www.youtube.com https://player.vimeo.com https://view.officeapps.live.com;">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-image: url('https://lh3.googleusercontent.com/profile/picture/0'); background-size: cover; background-position: center; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .navbar { background: white; padding: 14px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3b82f6; flex-wrap: wrap; gap: 12px; }
        .clock { background: #eff6ff; padding: 6px 14px; border-radius: 40px; font-family: monospace; }
        .logout-btn { background: #eff6ff; border: 1px solid #bfdbfe; padding: 8px 24px; border-radius: 40px; cursor: pointer; }
        .container { max-width: 1200px; margin: 0 auto; padding: 28px; }
        .welcome { background: linear-gradient(135deg,#1e40af,#3b82f6); color: white; padding: 28px; border-radius: 32px; margin-bottom: 32px; }
        .aulas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 24px; }
        .aula-card { background: white; border-radius: 28px; overflow: hidden; cursor: pointer; border: 1px solid #e2e8f0; transition: 0.2s; padding: 24px; }
        .aula-card:hover { transform: translateY(-3px); border-color: #3b82f6; }
        .progress-bar { height: 6px; background: #e2e8f0; border-radius: 10px; margin-top: 12px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg,#1e40af,#3b82f6); width: 0%; }
        .files-list { display: flex; flex-direction: column; gap: 12px; }
        .file-item { background: white; padding: 16px 20px; border-radius: 28px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; flex-wrap: wrap; gap: 12px; }
        .view-btn { background: linear-gradient(135deg,#1e40af,#3b82f6); border: none; color: white; padding: 8px 24px; border-radius: 40px; cursor: pointer; }
        .back-btn { background: #64748b; color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; margin-bottom: 24px; }
        .material-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .material-modal.active { display: flex; }
        .modal-container { background: white; border-radius: 32px; width: 90%; max-width: 1200px; height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 16px 24px; background: #1e40af; color: white; display: flex; justify-content: space-between; align-items: center; }
        .close-modal { background: none; border: none; color: white; font-size: 28px; cursor: pointer; }
        .modal-content { flex: 1; padding: 20px; overflow-y: auto; background: #f8fafc; }
        .pdf-viewer { width: 100%; height: 70vh; border: none; border-radius: 16px; }
    </style>
</head>
<body>
    <div id="initialLoader"><p style="color:#1e40af; padding: 40px;">Verificando acceso alumno...</p></div>
    
    <div class="navbar">
        <h2>📚 AULA ONAPC</h2>
        <div class="right-section">
            <div class="clock" id="realTimeClock">--:--:--</div>
            <button class="logout-btn" onclick="logout()">🚪 Salir</button>
        </div>
    </div>
    
    <div class="container">
        <div class="welcome">
            <h1 id="welcomeTitle">Bienvenido</h1>
            <p id="studentEmailDisplay">Cargando identidad...</p>
        </div>
        
        <div id="aulasView"><div id="aulasList" class="aulas-grid"></div></div>
        
        <div id="filesView" style="display:none;">
            <button class="back-btn" onclick="volverAulas()">← Volver a Aulas</button>
            <h2 id="aulaTitle" style="margin-bottom:20px;color:#1e40af;"></h2>
            <div id="filesList" class="files-list"></div>
        </div>
    </div>
    
    <div id="materialModal" class="material-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modalTitle">Cargando Recurso Educativo...</h3>
                <button class="close-modal" onclick="cerrarModal()">×</button>
            </div>
            <div class="modal-content" id="modalContent"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <script>
        const client = new Appwrite.Client()
            .setEndpoint('https://cloud.appwrite.io/v1')
            .setProject('PEGA_AQUÍ_TU_PROJECT_ID');

        const databases = new Appwrite.Databases(client);

        const DATABASE_ID = 'PEGA_AQUÍ_TU_DATABASE_ID';
        const COLL_AULAS = 'aulas';
        const COLL_FILES = 'files';
        const COLL_TRACKING = 'tracking';

        let studentEmail = '';
        let aulas = [];
        let files = [];
        let progresoGlobal = null;
        
        let sesionActual = null;
        let aulaVisitando = null;
        let materialAbierto = null;
        let materialStartTime = null;

        async function validarEstudiante() {
            studentEmail = localStorage.getItem('studentEmail');
            if (!studentEmail) {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('studentEmailDisplay').innerText = studentEmail;

            try {
                // Recuperar Repositorios
                const resAulas = await databases.listDocuments(DATABASE_ID, COLL_AULAS);
                aulas = resAulas.documents;

                const resFiles = await databases.listDocuments(DATABASE_ID, COLL_FILES);
                files = resFiles.documents;

                // Inicializar objeto de Auditoría/Tracking NoSQL
                await sincronizarProgresoGlobal();
                arrancarNuevaSesión();
                renderizarAulas();
            } catch (err) {
                console.error("Error cargando el aula virtual:", err);
            } finally {
                document.getElementById('initialLoader').style.display = 'none';
            }
        }

        async function sincronizarProgresoGlobal() {
            try {
                // Se busca si el estudiante ya tiene un documento de tracking guardado por su ID formateado
                const docId = studentEmail.replace(/[^a-zA-Z0-9]/g, '_');
                const doc = await databases.getDocument(DATABASE_ID, COLL_TRACKING, docId);
                progresoGlobal = JSON.parse(doc.data);
            } catch (err) {
                // Si no existe, se crea su registro maestro
                progresoGlobal = { studentEmail: studentEmail, sessions: [] };
            }
        }

        function arrancarNuevaSesión() {
            sesionActual = { sessionStart: new Date().toISOString(), sessionEnd: null, aulasVisited: [] };
            progresoGlobal.sessions.push(sesionActual);
        }

        async function guardarProgresoEnBackend() {
            if (!progresoGlobal) return;
            const docId = studentEmail.replace(/[^a-zA-Z0-9]/g, '_');
            try {
                const stringPayload = JSON.stringify(progresoGlobal);
                try {
                    await databases.updateDocument(DATABASE_ID, COLL_TRACKING, docId, { data: stringPayload });
                } catch {
                    await databases.createDocument(DATABASE_ID, COLL_TRACKING, docId, { data: stringPayload });
                }
            } catch (err) {
                console.error("Fallo crítico de sincronización de tracking:", err.message);
            }
        }

        function renderizarAulas() {
            const list = document.getElementById('aulasList');
            list.innerHTML = '';
            aulas.forEach(aula => {
                list.innerHTML += `
                    <div class="aula-card" onclick="entrarAula('${aula.$id}', '${aula.name}')">
                        <h3>📁 ${aula.name}</h3>
                        <p style="margin-top:8px; color:#64748b; font-size:0.85rem;">Toca para abrir materiales de estudio</p>
                    </div>`;
            });
        }

        function entrarAula(id, name) {
            document.getElementById('aulaTitle').innerText = name;
            document.getElementById('aulasView').style.display = 'none';
            document.getElementById('filesView').style.display = 'block';

            // Auditoría interna de ruta
            aulaVisitando = { aulaId: id, materialsViewed: [] };
            sesionActual.aulasVisited.push(aulaVisitando);

            renderizarArchivos(id);
        }

        function volverAulas() {
            aulaVisitando = null;
            document.getElementById('aulasView').style.display = 'block';
            document.getElementById('filesView').style.display = 'none';
            guardarProgresoEnBackend();
        }

        function renderizarArchivos(aulaId) {
            const list = document.getElementById('filesList');
            list.innerHTML = '';
            const filtrados = files.filter(f => f.aulaId === aulaId);

            if (filtrados.length === 0) {
                list.innerHTML = '<div class="empty-state">No hay materiales publicados en esta sección.</div>';
                return;
            }

            filtrados.forEach(file => {
                list.innerHTML += `
                    <div class="file-item">
                        <div><strong>📘 ${file.title}</strong></div>
                        <button class="view-btn" onclick="abrirMaterial('${file.$id}', '${file.title}', '${file.url}', '${file.type}')">Estudiar Recurso</button>
                    </div>`;
            });
        }

        function abrirMaterial(id, title, url, type) {
            document.getElementById('modalTitle').innerText = title;
            const content = document.getElementById('modalContent');
            
            materialAbierto = { title: title, duration: 0 };
            materialStartTime = Date.now();
            aulaVisitando.materialsViewed.push(materialAbierto);

            // Inyección segura controlada segun extensión
            if (type === 'pdf') {
                content.innerHTML = `<iframe src="${url}" class="pdf-viewer"></iframe>`;
            } else if (type === 'video') {
                content.innerHTML = `
                    <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;background:black;border-radius:16px;">
                        <iframe src="${url}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;" allowfullscreen></iframe>
                    </div>`;
            } else {
                content.innerHTML = `
                    <div style="text-align:center; padding:40px;">
                        <p style="margin-bottom:20px;">Este recurso debe visualizarse de forma externa o requiere descarga:</p>
                        <a href="${url}" target="_blank" style="background:#1e40af; color:white; padding:12px 24px; text-radius:20px; text-decoration:none; border-radius:30px;">Abrir Enlace Institucional</a>
                    </div>`;
            }

            document.getElementById('materialModal').classList.add('active');
        }

        function cerrarModal() {
            if (materialStartTime && materialAbierto) {
                const segundos = Math.round((Date.now() - materialStartTime) / 1000);
                materialAbierto.duration = segundos;
            }
            document.getElementById('materialModal').classList.remove('active');
            document.getElementById('modalContent').innerHTML = '';
            materialAbierto = null;
            materialStartTime = null;
            guardarProgresoEnBackend();
        }

        function logout() {
            if (sesionActual) sesionActual.sessionEnd = new Date().toISOString();
            guardarProgresoEnBackend().then(() => {
                localStorage.removeItem('studentEmail');
                window.location.href = 'index.html';
            });
        }

        // Eventos automáticos preventivos ante cierres inesperados
        window.addEventListener('beforeunload', () => {
            if (sesionActual) {
                if (materialStartTime && materialAbierto) {
                    materialAbierto.duration = Math.round((Date.now() - materialStartTime) / 1000);
                }
                sesionActual.sessionEnd = new Date().toISOString();
                // Utiliza beaconing síncrono simulado
                guardarProgresoEnBackend();
            }
        });

        setInterval(() => {
            document.getElementById('realTimeClock').innerText = new Date().toLocaleTimeString('es-VE');
        }, 1000);

        window.onload = validarEstudiante;
    </script>
</body>
</html>
